<!DOCTYPE html>
<html>
<head>
    <title>QR Code - Aero Lanches WhatsApp</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            font-family: Arial, sans-serif;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #128C7E;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        #qrcode {
            border: 3px solid #25D366;
            border-radius: 10px;
            width: 300px;
            height: 300px;
        }
        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 14px;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .loading { background: #fff3cd; color: #856404; }
        .connected { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            margin-top: 15px;
            padding: 12px 30px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #128C7E;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Aero Lanches</h1>
        <p>Escaneie o QR Code com seu WhatsApp</p>
        <img id="qrcode" src="" alt="QR Code WhatsApp"/>
        <div id="status" class="status loading">Carregando QR Code...</div>
        <button onclick="loadQRCode()">🔄 Atualizar QR Code</button>
        <div class="instructions">
            <strong>Instruções:</strong><br>
            1. Abra o WhatsApp no celular com o chip novo<br>
            2. Vá em Configurações > Dispositivos conectados<br>
            3. Clique em "Conectar dispositivo"<br>
            4. Escaneie este QR Code
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080';
        const API_KEY = 'teste123api';
        const INSTANCE = 'aero-lanches';

        async function loadQRCode() {
            const img = document.getElementById('qrcode');
            const status = document.getElementById('status');
            
            status.className = 'status loading';
            status.textContent = 'Carregando QR Code...';

            try {
                const response = await fetch(`${API_URL}/instance/connect/${INSTANCE}`, {
                    headers: { 'apikey': API_KEY }
                });
                
                const data = await response.json();
                
                if (data.base64) {
                    img.src = data.base64;
                    status.className = 'status loading';
                    status.textContent = `QR Code carregado! (tentativa ${data.count || 1}) - Escaneie agora!`;
                } else if (data.instance && data.instance.state === 'open') {
                    status.className = 'status connected';
                    status.textContent = '✅ WhatsApp CONECTADO com sucesso!';
                    img.style.display = 'none';
                } else {
                    status.className = 'status error';
                    status.textContent = 'Erro: ' + JSON.stringify(data);
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = 'Erro ao carregar: ' + error.message;
            }
        }

        // Carrega automaticamente ao abrir
        loadQRCode();
        
        // Atualiza a cada 30 segundos
        setInterval(loadQRCode, 30000);
    </script>
</body>
</html>
